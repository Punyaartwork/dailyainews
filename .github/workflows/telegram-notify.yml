name: Telegram notify on new brief

# Watches main for new daily briefs and pushes a TL;DR to Telegram via
# the Bot API. Replaces LINE dispatch — same trigger logic, different
# delivery surface.
#
# Required secrets (Settings → Secrets and variables → Actions):
#   TELEGRAM_BOT_TOKEN  — from @BotFather
#   TELEGRAM_CHAT_ID    — your user/group/channel ID

on:
  push:
    branches: [main]
    paths:
      - 'articles/*-brief.md'
  workflow_dispatch:
    inputs:
      file:
        description: 'Path of the brief file to notify for (defaults to most-recent)'
        required: false

permissions:
  contents: read

jobs:
  notify:
    if: ${{ !contains(github.event.head_commit.message, '[skip telegram]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Dispatch Telegram notification
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GH_SHA: ${{ github.sha }}
          GH_REPO: ${{ github.repository }}
          INPUT_FILE: ${{ github.event.inputs.file }}
        run: |
          set -euo pipefail

          # 1. Resolve which article to notify for.
          if [ -n "${INPUT_FILE:-}" ]; then
            FILE="$INPUT_FILE"
          else
            FILE=$(git show --name-only --format= HEAD \
              | grep -E '^articles/[0-9]{4}-[0-9]{2}-[0-9]{2}-brief\.md$' \
              | head -1 || true)
          fi

          if [ -z "${FILE:-}" ] || [ ! -f "$FILE" ]; then
            echo "No matching brief file — nothing to notify."
            exit 0
          fi
          echo "Brief: $FILE"

          # 2. Guard on secrets.
          if [ -z "${TELEGRAM_BOT_TOKEN:-}" ] || [ -z "${TELEGRAM_CHAT_ID:-}" ]; then
            echo "::warning::TELEGRAM_BOT_TOKEN or TELEGRAM_CHAT_ID not set — add them in Settings -> Secrets. Skipping."
            exit 0
          fi

          # 3. Build message — extract H1 title + TL;DR bullets + permalink.
          PERMALINK="https://github.com/${GH_REPO}/blob/${GH_SHA}/${FILE}"

          TITLE=$(grep -m1 '^# ' "$FILE" | sed 's/^# //')

          # Extract TL;DR block (lines between "> " markers)
          TLDR=$(awk '/^> TL;DR/{found=1; next} found && /^> -/{print substr($0,3)} found && !/^>/{exit}' "$FILE" \
            | head -3 \
            | sed 's/^/• /')

          MESSAGE=$(printf "*%s*\n\n%s\n\n🔗 [อ่านต่อ](%s)" \
            "$TITLE" "$TLDR" "$PERMALINK")

          # 4. POST to Telegram sendMessage.
          MSG_LEN=${#MESSAGE}
          echo "Message length: ${MSG_LEN} chars (Telegram limit: 4096)"

          HTTP_STATUS=$(curl -sS -o /tmp/tg_resp.txt -w '%{http_code}' \
            -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg chat_id "$TELEGRAM_CHAT_ID" \
              --arg text "$MESSAGE" \
              '{chat_id: $chat_id, text: $text, parse_mode: "Markdown", disable_web_page_preview: false}')")

          BODY=$(cat /tmp/tg_resp.txt)
          echo "Telegram API status: $HTTP_STATUS"
          echo "Telegram API body:   ${BODY:-(empty)}"

          if [ "$HTTP_STATUS" != "200" ]; then
            echo "::error::Telegram push failed (status=$HTTP_STATUS). No retry — by design."
            exit 1
          fi

          echo "✅ Telegram notification delivered."